version: '3.9'

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - IO_POSTGRES_HOST=postgres
      - IO_POSTGRES_PORT=5432
      - IO_POSTGRES_DB=impact_observatory
      - IO_POSTGRES_USER=io_admin
      - IO_POSTGRES_PASSWORD=io_pilot_2026
      - IO_NEO4J_URI=bolt://neo4j:7687
      - IO_NEO4J_USER=neo4j
      - IO_NEO4J_PASSWORD=io_graph_2026
      - IO_REDIS_URL=redis://redis:6379/0
      - IO_ENVIRONMENT=development
      - IO_LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_DB=impact_observatory
      - POSTGRES_USER=io_admin
      - POSTGRES_PASSWORD=io_pilot_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U io_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.18-community
    environment:
      - NEO4J_AUTH=neo4j/io_graph_2026
      - NEO4J_PLUGINS=["apoc","graph-data-science"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "neo4j status"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  neo4jdata:
  redisdata:
